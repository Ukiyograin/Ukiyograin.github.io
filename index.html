<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>浮生栖沙 · 流沙与代码之间</title>
    <link rel="icon" type="image/jpeg" href="icon/icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f4f0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1e1e1c;
            line-height: 1.4;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .hero {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #dcd7cd;
            padding-bottom: 2rem;
            margin-bottom: 3rem;
        }
        .title-group h1 {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e1e1c;
            line-height: 1.2;
        }
        .title-group .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: #6b6a64;
            margin-top: 0.5rem;
            border-left: 3px solid #cbc6bb;
            padding-left: 0.75rem;
        }
        .github-badge {
            background: #2c2b28;
            color: #f0eee9;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s ease;
            text-decoration: none;
        }
        .github-badge i {
            font-size: 1.2rem;
        }
        .github-badge:hover {
            background: #1e1e1c;
            transform: scale(0.98);
        }

        .profile-card {
            background: #faf9f6;
            border-radius: 32px;
            padding: 2rem;
            margin: 1rem 0 2rem;
            border: 1px solid #e9e3db;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            justify-content: space-between;
        }
        .profile-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #e3ddd4;
            border: 2px solid #e1d9d0;
            display: block;
        }
        .status-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            color: white;
            cursor: help;
            transition: transform 0.2s;
            border: 2px solid #faf9f6;
        }
        .status-indicator:hover {
            transform: scale(1.1);
        }
        .status-indicator.active {
            background-color: #2ea043;
        }
        .status-indicator.idle {
            background-color: #f0b400;
        }
        .status-indicator.offline {
            background-color: #6e6b66;
        }
        .profile-text h2 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.2px;
            margin-bottom: 0.3rem;
        }
        .profile-bio {
            color: #5f5e58;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-top: 0.3rem;
            max-width: 500px;
        }
        .profile-meta {
            margin-top: 8px;
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: #8a8880;
        }
        .profile-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .stats-mini {
            display: flex;
            gap: 1.8rem;
            background: #ffffff;
            padding: 0.8rem 1.8rem;
            border-radius: 80px;
            border: 1px solid #e7e1d8;
        }
        .stats-mini div {
            text-align: center;
        }
        .stats-number {
            font-weight: 700;
            font-size: 1.3rem;
            color: #2c2b28;
        }
        .stats-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #928f86;
        }

        .carousel-section {
            margin: 2rem 0 3rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin: 1rem 0 1.2rem;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid #e0d9d0;
            padding-bottom: 0.8rem;
        }
        .section-title span:first-child {
            font-weight: 600;
        }
        .repo-count {
            font-size: 0.85rem;
            background: #e9e4dd;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: 400;
        }
        .carousel-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            gap: 1.5rem;
        }
        .repo-carousel-card {
            flex: 0 0 calc(33.333% - 1rem);
            background: #ffffff;
            border-radius: 28px;
            padding: 1.6rem;
            border: 1px solid #ece7e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
        }
        .repo-carousel-card:hover {
            transform: translateY(-4px);
            border-color: #d0c8bc;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.08);
        }
        .repo-name {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .repo-name i {
            color: #6b6a64;
            font-size: 1.2rem;
        }
        .repo-name a {
            text-decoration: none;
            color: #1e1e1c;
            border-bottom: 1px solid transparent;
            transition: border 0.2s;
        }
        .repo-name a:hover {
            border-bottom: 1.5px solid #bcafa0;
        }
        .repo-desc {
            color: #4d4c47;
            font-size: 0.9rem;
            line-height: 1.45;
            margin: 0.7rem 0 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .repo-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #8a8880;
            border-top: 1px solid #f0ede8;
            padding-top: 0.9rem;
            margin-top: 0.5rem;
        }
        .repo-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .lang-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 43, 40, 0.85);
            backdrop-filter: blur(8px);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-btn:hover {
            background: #2c2b28;
            transform: translateY(-50%) scale(1.02);
        }
        .btn-prev {
            left: 12px;
        }
        .btn-next {
            right: 12px;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1.2rem;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc6bd;
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.active {
            background: #5a5952;
            width: 24px;
            border-radius: 12px;
        }

        .gallery-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            margin-top: 1rem;
        }
        .gallery-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .gallery-page {
            flex: 0 0 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding: 0.5rem;
        }
        .gallery-item {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #ece7e0;
            transition: 0.25s ease;
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .gallery-item:hover {
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.15);
        }
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1.2rem;
        }
        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc6bd;
            cursor: pointer;
            transition: 0.2s;
        }
        .gallery-dot.active {
            background: #5a5952;
            width: 24px;
            border-radius: 12px;
        }

        .status-message {
            background: #f0ede8;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            color: #4c4a44;
            margin: 2rem 0;
        }
        .loader {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 2px solid #cbc6bb;
            border-radius: 50%;
            border-top-color: #5a5952;
            animation: spin 0.7s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: #9b9890;
            border-top: 1px solid #e2dbd2;
            padding-top: 2rem;
        }
        @media (max-width: 900px) {
            .repo-carousel-card {
                flex: 0 0 calc(50% - 0.75rem);
            }
            .gallery-page {
                gap: 0.8rem;
            }
        }
        @media (max-width: 700px) {
            .container {
                padding: 1.5rem;
            }
            .hero {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .profile-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats-mini {
                width: 100%;
                justify-content: space-around;
            }
            .repo-carousel-card {
                flex: 0 0 100%;
            }
            .gallery-page {
                gap: 0.5rem;
            }
        }
        a {
            text-decoration: none;
        }
        .fa, .fas, .far {
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="title-group">
            <h1>浮生栖沙</h1>
            <div class="tagline">热爱生活，以及生活给予我的一切</div>
        </div>
        <a href="https://github.com/Ukiyograin" target="_blank" rel="noopener noreferrer" class="github-badge">
            <i class="fab fa-github"></i> @Ukiyograin
            <i class="fas fa-arrow-up-right-from-squares" style="font-size: 0.7rem;"></i>
        </a>
    </div>

    <div id="github-profile-container">
        <div class="status-message" id="loading-placeholder">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div class="loader"></div> <span>正在从 GitHub 获取「浮生栖沙」的创作轨迹 ...</span>
            </div>
        </div>
    </div>

    <div id="repos-carousel-section" class="carousel-section" style="display: none;">
        <div class="section-title">
            <span><i class="fas fa-code-branch" style="margin-right: 8px;"></i> 开源项目 · 精选仓库</span>
            <span class="repo-count" id="repo-count-badge">0 repositories</span>
        </div>
        <div class="carousel-container">
            <button class="carousel-btn btn-prev" id="repoPrevBtn"><i class="fas fa-chevron-left"></i></button>
            <div class="carousel-track" id="repoCarouselTrack"></div>
            <button class="carousel-btn btn-next" id="repoNextBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="carousel-dots" id="repoDots"></div>
    </div>

    <div id="gallery-section" class="carousel-section" style="display: none;">
        <div class="section-title">
            <span><i class="fas fa-images" style="margin-right: 8px;"></i> 精选照片</span>
        </div>
        <div class="gallery-container">
            <div class="gallery-track" id="galleryTrack"></div>
        </div>
        <div class="gallery-dots" id="galleryDots"></div>
    </div>

    <footer>
        <i class="fas fa-terminal"></i> 浮生栖沙
        <span style="margin: 0 8px">✦</span> We found that your request fell into the water.
    </footer>
</div>

<script>
    const GITHUB_USERNAME = 'Ukiyograin';
    const profileContainer = document.getElementById('github-profile-container');
    const reposCarouselSection = document.getElementById('repos-carousel-section');
    const carouselTrack = document.getElementById('repoCarouselTrack');
    const repoPrevBtn = document.getElementById('repoPrevBtn');
    const repoNextBtn = document.getElementById('repoNextBtn');
    const repoDots = document.getElementById('repoDots');
    const repoCountBadge = document.getElementById('repo-count-badge');
    const gallerySection = document.getElementById('gallery-section');
    const galleryTrack = document.getElementById('galleryTrack');
    const galleryDots = document.getElementById('galleryDots');

    let reposData = [];
    let currentIndex = 0;
    let itemsPerView = 3;
    let autoPlayInterval = null;
    let isHovering = false;
    let galleryImages = [];
    let galleryCurrentPage = 0;
    let galleryAutoPlayInterval = null;
    let isGalleryHovering = false;

    function updateItemsPerView() {
        if (window.innerWidth <= 700) itemsPerView = 1;
        else if (window.innerWidth <= 900) itemsPerView = 2;
        else itemsPerView = 3;
    }

    async function fetchJSON(url) {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
    }

    async function loadGitHubData() {
        try {
            const [userData, reposDataRaw, eventsData] = await Promise.all([
                fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}`),
                fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=30&direction=desc`),
                fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}/events?per_page=1`)
            ]);
            
            const status = getGitHubStatus(eventsData);
            renderProfileCard(userData, status);
            reposData = reposDataRaw
                .sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0))
                .slice(0, 10);
            
            if (reposData.length > 0) {
                renderCarousel();
                reposCarouselSection.style.display = 'block';
                startAutoPlay();
            }
            
            await loadGalleryImages();
            
            const loadingPlaceholder = document.getElementById('loading-placeholder');
            if (loadingPlaceholder) loadingPlaceholder.style.display = 'none';
            
        } catch (error) {
            profileContainer.innerHTML = `
                <div class="status-message" style="background: #f7f3ef;">
                    <i class="fas fa-cloud-moon" style="font-size: 1.6rem; margin-bottom: 8px; opacity: 0.7; display: block;"></i>
                    <strong style="font-weight: 500;">未能连接到 GitHub 数据流</strong><br>
                    请稍后刷新重试，或访问 <a href="https://github.com/Ukiyograin" target="_blank" style="color: #4c4a44; text-decoration: underline;">github.com/Ukiyograin</a> 直接浏览。
                    <div style="margin-top: 12px; font-size: 0.8rem;">✨ 浮生栖沙 · 代码未完待续</div>
                </div>
            `;
            const loadingElem = document.getElementById('loading-placeholder');
            if (loadingElem) loadingElem.style.display = 'none';
            reposCarouselSection.style.display = 'none';
        }
    }

    function getGitHubStatus(events) {
        if (!events || events.length === 0) return 'offline';
        const lastEvent = events[0];
        const lastEventTime = new Date(lastEvent.created_at);
        const now = new Date();
        const hoursDiff = (now - lastEventTime) / (1000 * 60 * 60);
        if (hoursDiff < 2) return 'active';
        if (hoursDiff < 24) return 'idle';
        return 'offline';
    }

    function renderProfileCard(user, status) {
        if (!user) return;
        const displayName = user.name || user.login;
        let bioText = user.bio;
        if (!bioText || bioText.trim() === '') {
            bioText = '写代码，也写诗。在比特与流沙之间搭建个人宇宙。';
        }
        const avatarUrl = user.avatar_url;
        const followers = user.followers ?? 0;
        const following = user.following ?? 0;
        const publicRepos = user.public_repos ?? 0;
        
        const statusIcon = status === 'active' ? '💻' : (status === 'idle' ? '🌙' : '💤');
        const statusTitle = status === 'active' ? '活跃编码中' : (status === 'idle' ? '最近休息中' : '最近未活跃');
        
        const profileHtml = `
            <div class="profile-card">
                <div class="profile-info">
                    <div class="avatar-wrapper">
                        <img class="avatar" src="${avatarUrl}" alt="avatar" onerror="this.src='https://via.placeholder.com/80?text=GS'">
                        <div class="status-indicator ${status}" title="${statusTitle} ${statusIcon}">
                            ${statusIcon}
                        </div>
                    </div>
                    <div class="profile-text">
                        <h2>${escapeHtml(displayName)} <span style="font-weight: 400; font-size: 1rem; color:#9b9890;">· 浮生栖沙</span></h2>
                        <div class="profile-bio">${escapeHtml(bioText)}</div>
                        <div class="profile-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(user.location || '数字游牧')}</span>
                            <span><i class="fas fa-link"></i> <a href="${user.blog && user.blog.startsWith('http') ? user.blog : '#'}" target="_blank" style="color:#5f5e58; border-bottom:1px solid #ddd;">${user.blog ? truncateUrl(user.blog) : '个人领域'}</a></span>
                        </div>
                    </div>
                </div>
                <div class="stats-mini">
                    <div><div class="stats-number">${publicRepos}</div><div class="stats-label">仓库</div></div>
                    <div><div class="stats-number">${followers}</div><div class="stats-label">追随者</div></div>
                    <div><div class="stats-number">${following}</div><div class="stats-label">正在关注</div></div>
                </div>
            </div>
        `;
        profileContainer.innerHTML = profileHtml;
    }

    function startAutoPlay() {
        if (autoPlayInterval) clearInterval(autoPlayInterval);
        autoPlayInterval = setInterval(() => {
            if (!isHovering && reposData.length > 0) {
                const maxIndex = Math.max(0, reposData.length - itemsPerView);
                if (currentIndex < maxIndex) {
                    currentIndex++;
                    updateCarousel();
                } else {
                    currentIndex = 0;
                    updateCarousel();
                }
            }
        }, 4000);
    }

    function stopAutoPlay() {
        if (autoPlayInterval) {
            clearInterval(autoPlayInterval);
            autoPlayInterval = null;
        }
    }

    function startGalleryAutoPlay() {
        if (galleryAutoPlayInterval) clearInterval(galleryAutoPlayInterval);
        if (galleryImages.length === 0) return;
        const totalPages = Math.ceil(galleryImages.length / 9);
        if (totalPages <= 1) return;
        
        galleryAutoPlayInterval = setInterval(() => {
            if (!isGalleryHovering) {
                const totalPages = Math.ceil(galleryImages.length / 9);
                if (galleryCurrentPage < totalPages - 1) {
                    galleryCurrentPage++;
                } else {
                    galleryCurrentPage = 0;
                }
                updateGallery();
            }
        }, 5000);
    }

    function stopGalleryAutoPlay() {
        if (galleryAutoPlayInterval) {
            clearInterval(galleryAutoPlayInterval);
            galleryAutoPlayInterval = null;
        }
    }

    function renderCarousel() {
        if (!reposData.length) return;
        repoCountBadge.innerText = `${reposData.length} repositories`;
        updateItemsPerView();
        renderCarouselTrack();
        renderDots();
        updateCarousel();
        
        const carouselContainer = document.querySelector('.carousel-container');
        if (carouselContainer) {
            carouselContainer.addEventListener('mouseenter', () => {
                isHovering = true;
                stopAutoPlay();
            });
            carouselContainer.addEventListener('mouseleave', () => {
                isHovering = false;
                startAutoPlay();
            });
        }
        
        window.addEventListener('resize', () => {
            updateItemsPerView();
            renderCarouselTrack();
            renderDots();
            currentIndex = 0;
            updateCarousel();
            stopAutoPlay();
            startAutoPlay();
        });
        
        repoPrevBtn.addEventListener('click', () => {
            stopAutoPlay();
            const maxIndex = Math.max(0, reposData.length - itemsPerView);
            if (currentIndex > 0) {
                currentIndex--;
                updateCarousel();
            } else {
                currentIndex = maxIndex;
                updateCarousel();
            }
            startAutoPlay();
        });
        
        repoNextBtn.addEventListener('click', () => {
            stopAutoPlay();
            const maxIndex = Math.max(0, reposData.length - itemsPerView);
            if (currentIndex < maxIndex) {
                currentIndex++;
                updateCarousel();
            } else {
                currentIndex = 0;
                updateCarousel();
            }
            startAutoPlay();
        });
    }
    
    function renderCarouselTrack() {
        carouselTrack.innerHTML = '';
        const langColorMap = {
            'JavaScript': '#e6b450', 'TypeScript': '#2d7a6e', 'HTML': '#cf6f2e',
            'CSS': '#3d6b7c', 'Python': '#4f7e6b', 'Java': '#b0723b',
            'Go': '#4c9b8f', 'Rust': '#b26b3a', 'Vue': '#4d7c6b',
            'React': '#467c7a', 'Shell': '#7c7a58', 'default': '#9b958b'
        };
        
        reposData.forEach(repo => {
            const language = repo.language;
            const langColor = langColorMap[language] || langColorMap['default'];
            const langColorStyle = language ? `<span class="lang-color" style="background-color: ${langColor};"></span> ${escapeHtml(language)}` : '';
            const updatedAt = repo.updated_at ? new Date(repo.updated_at).toLocaleDateString('zh-CN', { year:'numeric', month:'short', day:'numeric' }) : '近期';
            
            const card = document.createElement('div');
            card.className = 'repo-carousel-card';
            card.innerHTML = `
                <div class="repo-name">
                    <i class="fab fa-github-alt"></i>
                    <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer">${escapeHtml(repo.name)}</a>
                </div>
                <div class="repo-desc">${escapeHtml(repo.description || '无具体描述，但代码本身会说话。')}</div>
                <div class="repo-meta">
                    ${language ? `<span>${langColorStyle}</span>` : ''}
                    <span><i class="far fa-star"></i> ${repo.stargazers_count ?? 0}</span>
                    <span><i class="fas fa-code-branch"></i> ${repo.forks_count ?? 0}</span>
                    <span><i class="far fa-calendar-alt"></i> ${updatedAt}</span>
                </div>
            `;
            carouselTrack.appendChild(card);
        });
    }
    
    function renderDots() {
        const totalDots = Math.max(1, reposData.length - itemsPerView + 1);
        repoDots.innerHTML = '';
        for (let i = 0; i < totalDots; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.addEventListener('click', () => {
                stopAutoPlay();
                currentIndex = i;
                updateCarousel();
                startAutoPlay();
            });
            repoDots.appendChild(dot);
        }
    }
    
    function updateCarousel() {
        const cardWidth = carouselTrack.children[0]?.offsetWidth || 0;
        const trackGap = parseFloat(getComputedStyle(carouselTrack).gap) || 24;
        const offset = currentIndex * (cardWidth + trackGap);
        carouselTrack.style.transform = `translateX(-${offset}px)`;
        
        const dots = document.querySelectorAll('#repoDots .dot');
        dots.forEach((dot, idx) => {
            if (idx === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    async function loadGalleryImages() {
        const extensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
        const loadedImages = [];
        
        for (let i = 1; i <= 50; i++) {
            for (const ext of extensions) {
                const imgPath = `pictures/${i}.${ext}`;
                const exists = await imageExists(imgPath);
                if (exists) {
                    loadedImages.push(imgPath);
                    break;
                }
            }
        }
        
        if (loadedImages.length === 0) {
            gallerySection.style.display = 'none';
            return;
        }
        
        galleryImages = loadedImages;
        gallerySection.style.display = 'block';
        renderGallery();
        startGalleryAutoPlay();
        
        const galleryContainer = document.querySelector('.gallery-container');
        if (galleryContainer) {
            galleryContainer.addEventListener('mouseenter', () => {
                isGalleryHovering = true;
                stopGalleryAutoPlay();
            });
            galleryContainer.addEventListener('mouseleave', () => {
                isGalleryHovering = false;
                startGalleryAutoPlay();
            });
        }
    }
    
    function imageExists(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }
    
    function renderGallery() {
        const itemsPerPage = 9;
        const totalPages = Math.ceil(galleryImages.length / itemsPerPage);
        galleryTrack.innerHTML = '';
        
        for (let page = 0; page < totalPages; page++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'gallery-page';
            
            const start = page * itemsPerPage;
            const end = Math.min(start + itemsPerPage, galleryImages.length);
            
            for (let i = start; i < end; i++) {
                const imgPath = galleryImages[i];
                const fileName = imgPath.split('/').pop();
                const altText = `照片 ${fileName}`;
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `<img src="${imgPath}" alt="${escapeHtml(altText)}" loading="lazy">`;
                pageDiv.appendChild(galleryItem);
            }
            
            galleryTrack.appendChild(pageDiv);
        }
        
        if (totalPages > 1) {
            renderGalleryDots(totalPages);
        } else {
            galleryDots.style.display = 'none';
        }
        
        updateGallery();
    }
    
    function renderGalleryDots(totalPages) {
        galleryDots.style.display = 'flex';
        galleryDots.innerHTML = '';
        for (let i = 0; i < totalPages; i++) {
            const dot = document.createElement('div');
            dot.classList.add('gallery-dot');
            dot.addEventListener('click', () => {
                stopGalleryAutoPlay();
                galleryCurrentPage = i;
                updateGallery();
                startGalleryAutoPlay();
            });
            galleryDots.appendChild(dot);
        }
    }
    
    function updateGallery() {
        const pageWidth = galleryTrack.children[0]?.offsetWidth || 0;
        const offset = galleryCurrentPage * pageWidth;
        galleryTrack.style.transform = `translateX(-${offset}px)`;
        
        const dots = document.querySelectorAll('.gallery-dot');
        dots.forEach((dot, idx) => {
            if (idx === galleryCurrentPage) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function truncateUrl(url) {
        if (!url) return '';
        return url.length > 30 ? url.substring(0, 27) + '...' : url;
    }
    
    loadGitHubData();
</script>
</body>
</html>
