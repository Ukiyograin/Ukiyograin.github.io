    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.4;
            scroll-behavior: smooth;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .hero {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid;
            padding-bottom: 2rem;
            margin-bottom: 3rem;
            transition: border-color 0.2s;
        }

        .title-group h1 {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .title-group .tagline {
            font-size: 1rem;
            font-weight: 400;
            margin-top: 0.5rem;
            border-left: 3px solid;
            padding-left: 0.75rem;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .github-badge {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .github-badge i {
            font-size: 1.2rem;
        }

        .github-badge:hover {
            transform: scale(0.98);
        }

        .ctrl-btn {
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: inherit;
            border: 1px solid;
        }

        .ctrl-btn:hover {
            transform: translateY(-1px);
        }

        .theme-select {
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            outline: none;
            border: 1px solid;
        }

        /* 音乐播放器圆盘按钮 */
        .music-player {
            position: relative;
        }

        .vinyl-btn {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: none;
            background: transparent;
            overflow: visible;
        }

        .vinyl-disc {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .vinyl-disc i {
            font-size: 1.2rem;
            position: relative;
            z-index: 2;
            transition: transform 0.2s;
        }

        .vinyl-ring {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .vinyl-btn:hover .vinyl-ring {
            opacity: 0.4;
            transform: scale(1.15);
        }

        .vinyl-btn.playing .vinyl-disc {
            animation: spinVinyl 4s linear infinite;
        }

        .vinyl-btn.playing .vinyl-ring {
            animation: pulseRing 1.2s ease-out infinite;
        }

        @keyframes spinVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        /* 音乐提示气泡 */
        .music-tooltip {
            position: absolute;
            bottom: 55px;
            right: 0;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .vinyl-btn:hover .music-tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        .profile-card {
            border-radius: 32px;
            padding: 2rem;
            margin: 1rem 0 2rem;
            border: 1px solid;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s, border-color 0.2s;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid;
            display: block;
        }

        .status-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            color: white;
            cursor: help;
            transition: transform 0.2s;
            border: 2px solid;
        }

        .status-indicator:hover {
            transform: scale(1.1);
        }

        .status-indicator.active {
            background-color: #2ea043;
        }

        .status-indicator.idle {
            background-color: #f0b400;
        }

        .status-indicator.offline {
            background-color: #6e6b66;
        }

        .profile-text h2 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.2px;
            margin-bottom: 0.3rem;
        }

        .profile-bio {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-top: 0.3rem;
            max-width: 500px;
        }

        .profile-meta {
            margin-top: 8px;
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
        }

        .profile-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .stats-mini {
            display: flex;
            gap: 2rem;
            padding: 0.8rem 2rem;
            border-radius: 80px;
            border: 1px solid;
            transition: background 0.2s;
        }

        .stat-item {
            text-align: center;
            min-width: 70px;
        }

        .stats-number {
            font-weight: 700;
            font-size: 1.6rem;
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }

        .stats-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .snake-container {
            margin: 2rem 0 2rem;
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.2s;
            background: transparent;
        }

        .snake-container svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
        }

        .carousel-section {
            margin: 2rem 0 3rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin: 1rem 0 1.2rem;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid;
            padding-bottom: 0.8rem;
        }

        .section-title span:first-child {
            font-weight: 600;
        }

        .repo-count {
            font-size: 0.85rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: 400;
        }

        .carousel-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            gap: 1.5rem;
        }

        .repo-carousel-card {
            flex: 0 0 calc(33.333% - 1rem);
            border-radius: 28px;
            padding: 1.6rem;
            border: 1px solid;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
        }

        .repo-carousel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.08);
        }

        .repo-name {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .repo-name i {
            font-size: 1.2rem;
        }

        .repo-name a {
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border 0.2s;
        }

        .repo-name a:hover {
            border-bottom: 1.5px solid;
        }

        .repo-desc {
            font-size: 0.9rem;
            line-height: 1.45;
            margin: 0.7rem 0 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            border-top: 1px solid;
            padding-top: 0.9rem;
            margin-top: 0.5rem;
        }

        .repo-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .lang-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            backdrop-filter: blur(8px);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-btn:hover {
            transform: translateY(-50%) scale(1.02);
        }

        .btn-prev {
            left: 12px;
        }

        .btn-next {
            right: 12px;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1.2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .dot.active {
            width: 24px;
            border-radius: 12px;
        }

        .marquee-section {
            margin: 2rem 0 3rem;
        }

        .marquee-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            width: 100%;
        }

        .marquee-track {
            display: flex;
            will-change: transform;
        }

        .marquee-item {
            flex-shrink: 0;
            width: 280px;
            margin-right: 1.2rem;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid;
            transition: all 0.25s ease;
            cursor: pointer;
            background: rgba(0,0,0,0.02);
            aspect-ratio: 4 / 3;
        }

        .marquee-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
            transition: transform 0.3s ease;
        }

        .marquee-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.2);
        }

        .marquee-item:hover img {
            transform: scale(1.02);
        }

        .status-message {
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            margin: 2rem 0;
        }

        .loader {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 2px solid;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.7s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            border-top: 1px solid;
            padding-top: 2rem;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: lightboxFadeIn 0.3s ease;
        }

        @keyframes lightboxFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 32px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            .repo-carousel-card {
                flex: 0 0 calc(50% - 0.75rem);
            }
        }

        @media (max-width: 700px) {
            .container {
                padding: 1.5rem;
            }
            .hero {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .header-actions {
                margin-top: 0.5rem;
                width: 100%;
                justify-content: flex-start;
            }
            .profile-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats-mini {
                width: 100%;
                justify-content: space-around;
            }
            .repo-carousel-card {
                flex: 0 0 100%;
            }
            .marquee-item {
                width: 220px;
                margin-right: 0.8rem;
            }
            .lightbox-close {
                top: 16px;
                right: 20px;
                width: 36px;
                height: 36px;
                font-size: 22px;
            }
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

        let reposData = [];

        // 音乐播放器

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCloseBtn = document.getElementById('lightboxCloseBtn');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function truncateUrl(url) {
            return url.length > 30 ? url.substring(0, 27) + '...' : url;
        }

        function openLightbox(imgSrc) {
            lightboxImg.src = imgSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        if (lightboxCloseBtn) {
            lightboxCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeLightbox();
            });
        }
        if (lightbox) {
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox && lightbox.classList.contains('active')) closeLightbox();
        });

        // 音乐播放器初始化
        function initMusicPlayer() {
            try {
                audio = new Audio('music/1.mp3');
                audio.loop = true;
                audio.volume = 0.6;
                
                const savedState = localStorage.getItem(STORAGE_MUSIC_KEY);
                if (savedState === 'playing') {
                    audio.play().catch(e => console.log('自动播放被浏览器阻止，需要用户交互'));
                }
                
                audio.addEventListener('play', () => {
                    isMusicPlaying = true;
                    dom.musicBtn.classList.add('playing');
                    updateMusicTooltip();
                    localStorage.setItem(STORAGE_MUSIC_KEY, 'playing');
                });
                
                audio.addEventListener('pause', () => {
                    isMusicPlaying = false;
                    dom.musicBtn.classList.remove('playing');
                    updateMusicTooltip();
                    localStorage.setItem(STORAGE_MUSIC_KEY, 'paused');
                });
                
                audio.addEventListener('error', () => {
                    console.log('音乐文件加载失败');
                    dom.musicTooltip.textContent = '🎵 音乐加载失败';
                });
                
            } catch(e) {
                console.log('音乐播放器初始化失败', e);
            }
        }
        
        function updateMusicTooltip() {
            const t = TEXTS[currentLang];
            if (dom.musicTooltip) {
                dom.musicTooltip.textContent = isMusicPlaying ? t.musicPause : t.musicPlay;
            }
        }
        
        function toggleMusic() {
            if (!audio) {
                initMusicPlayer();
                if (!audio) return;
            }
            
            if (isMusicPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => {
                    console.log('播放失败:', e);
                    dom.musicTooltip.textContent = '⚠️ 需要点击页面后播放';
                    setTimeout(() => updateMusicTooltip(), 1500);
                });
            }
        }
        
        function updateMusicButtonTheme() {
            if (!dom.vinylDisc) return;
            const theme = THEMES[currentTheme];
            dom.vinylDisc.style.backgroundColor = theme.vinylBg;
            dom.vinylDisc.style.color = theme.vinylIcon;
            dom.vinylDisc.style.boxShadow = `0 0 0 2px ${theme.borderLight}, 0 4px 12px rgba(0,0,0,0.1)`;
        }

        function loadSnakeSvg() {
            const theme = THEMES[currentTheme];
            const isLight = theme.isLight;
            const svgPath = isLight ? 'svg/snake-Light.svg' : 'svg/snake-Dark.svg';
            fetch(svgPath)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.text();
                })
                .then(svgText => {
                    dom.snakeContainer.innerHTML = svgText;
                    const svgElem = dom.snakeContainer.querySelector('svg');
                    if (svgElem) {
                        svgElem.style.width = '100%';
                        svgElem.style.height = 'auto';
                        svgElem.style.display = 'block';
                        svgElem.style.borderRadius = '24px';
                    }
                })
                .catch(() => {
                    dom.snakeContainer.innerHTML = '<div style="padding:1rem;text-align:center;border-radius:24px;border:1px dashed;background:transparent;"><i class="fas fa-gamepad"></i> 🐍 snake svg missing</div>';
                });
        }

        function applyTheme(themeName, save = true) {
            currentTheme = themeName;
            const t = THEMES[themeName];
            if (!t) return;
            
            document.body.style.backgroundColor = t.bgBody;
            document.body.style.color = t.textPrimary;
            document.querySelector('.hero')?.style.setProperty('border-color', t.borderLight);
            document.querySelectorAll('.section-title').forEach(st => st.style.borderBottomColor = t.borderLight);
            document.querySelectorAll('.profile-card').forEach(card => {
                card.style.backgroundColor = t.cardBg;
                card.style.borderColor = t.cardBorder;
            });
            document.querySelectorAll('.stats-mini').forEach(stat => {
                stat.style.backgroundColor = t.statBg;
                stat.style.borderColor = t.cardBorder;
            });
            document.querySelectorAll('.repo-carousel-card').forEach(card => {
                card.style.backgroundColor = t.repoCardBg;
                card.style.borderColor = t.cardBorder;
            });
            document.querySelectorAll('.repo-name a').forEach(link => {
                link.style.color = t.linkColor;
            });
            document.querySelectorAll('.dot').forEach(dot => {
                dot.style.backgroundColor = t.dotInactive;
                if (dot.classList.contains('active')) dot.style.backgroundColor = t.dotActive;
            });
            document.querySelectorAll('.marquee-item').forEach(item => item.style.borderColor = t.cardBorder);
            
            if (dom.langSwitchBtn) {
                dom.langSwitchBtn.style.backgroundColor = t.ctrlBg;
                dom.langSwitchBtn.style.color = t.ctrlText;
                dom.langSwitchBtn.style.borderColor = t.borderLight;
            }
            if (dom.themeSelect) {
                dom.themeSelect.style.backgroundColor = t.selectBg;
                dom.themeSelect.style.color = t.selectText;
                dom.themeSelect.style.borderColor = t.borderLight;
            }
            const githubBadge = document.getElementById('githubBadge');
            if (githubBadge) {
                githubBadge.style.backgroundColor = t.btnBg;
                githubBadge.style.color = t.btnText;
            }
            document.querySelectorAll('.carousel-btn').forEach(btn => {
                btn.style.backgroundColor = t.btnBg;
                btn.style.color = t.btnText;
            });
            const loaderDiv = document.getElementById('loadingSpinner');
            if (loaderDiv) {
                loaderDiv.style.borderColor = t.loaderBorder;
                loaderDiv.style.borderTopColor = t.loaderTop;
            }
            const statusMsg = document.querySelector('.status-message');
            if (statusMsg) statusMsg.style.backgroundColor = t.cardBg;
            
            updateMusicButtonTheme();
            
            if (save) {
                try { localStorage.setItem(STORAGE_THEME_KEY, themeName); } catch(e) {}
            }
            loadSnakeSvg();
        }

        function updateThemeSelectLabels() {
            const texts = TEXTS[currentLang];
            if (!dom.themeSelect || !texts.themeNames) return;
            Array.from(dom.themeSelect.options).forEach(option => {
                const themeKey = option.value;
                if (texts.themeNames[themeKey]) {
                    option.textContent = texts.themeNames[themeKey];
                }
            });
        }

        function setLanguage(lang, save = true) {
            currentLang = lang;
            const t = TEXTS[lang];
            
            if (dom.siteTitle) dom.siteTitle.innerText = t.siteTitle;
            if (dom.siteTagline) dom.siteTagline.innerText = t.tagline;
            if (dom.langText) dom.langText.innerText = t.langBtn;
            if (dom.loadingMsg) dom.loadingMsg.innerText = t.loading;
            if (dom.reposTitle) dom.reposTitle.innerText = t.reposTitle;
            if (dom.galleryTitle) dom.galleryTitle.innerText = t.galleryTitle;
            if (dom.footerText) dom.footerText.innerText = t.footerText;
            if (dom.footerSub) dom.footerSub.innerText = t.footerSub;
            
            if (dom.repoCountBadge && reposData.length) {
                dom.repoCountBadge.innerText = `${reposData.length} ${t.repoCountPrefix}`;
            }
            
            updateThemeSelectLabels();
            updateMusicTooltip();
            
            if (window._currentUserData && window._currentStatus) {
                renderProfileCard(window._currentUserData, window._currentStatus);
            }
            
            if (reposData.length && dom.carouselTrack) {
                renderCarouselTrack();
                updateCarousel();
            }
            
            if (save) {
                try { localStorage.setItem(STORAGE_LANG_KEY, lang); } catch(e) {}
            }
        }

        function renderProfileCard(user, status) {
            if (!user) return;
            const t = TEXTS[currentLang];
            const theme = THEMES[currentTheme];
            const displayName = user.name || user.login;
            const bioText = (user.bio && user.bio.trim()) ? user.bio : t.profileFallbackBio;
            const statusIcon = status === 'active' ? '💻' : (status === 'idle' ? '🌙' : '💤');
            const statusTitle = status === 'active' ? (currentLang === 'zh' ? '活跃编码中' : 'Active') : (status === 'idle' ? (currentLang === 'zh' ? '最近休息中' : 'Idle') : (currentLang === 'zh' ? '离线' : 'Offline'));
            
            const html = `
                <div class="profile-card" style="background:${theme.cardBg}; border-color:${theme.cardBorder};">
                    <div class="profile-info">
                        <div class="avatar-wrapper">
                            <img class="avatar" src="${user.avatar_url}" alt="avatar" style="border-color:${theme.borderLight};">
                            <div class="status-indicator ${status}" title="${statusTitle}">${statusIcon}</div>
                        </div>
                        <div class="profile-text">
                            <h2>${escapeHtml(displayName)} <span style="font-weight:400; font-size:1rem;">· Ukiyograin</span></h2>
                            <div class="profile-bio">${escapeHtml(bioText)}</div>
                            <div class="profile-meta">
                                <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(user.location || t.locationFallback)}</span>
                                <span><i class="fas fa-link"></i> <a href="${user.blog && user.blog.startsWith('http') ? user.blog : '#'}" target="_blank" style="color:${theme.accentMuted};">${user.blog ? truncateUrl(user.blog) : t.blogFallback}</a></span>
                            </div>
                        </div>
                    </div>
                    <div class="stats-mini" style="background:${theme.statBg}; border-color:${theme.cardBorder};">
                        <div class="stat-item"><div class="stats-number">${user.public_repos ?? 0}</div><div class="stats-label">${t.reposLabel}</div></div>
                        <div class="stat-item"><div class="stats-number">${user.followers ?? 0}</div><div class="stats-label">${t.followersLabel}</div></div>
                        <div class="stat-item"><div class="stats-number">${user.following ?? 0}</div><div class="stats-label">${t.followingLabel}</div></div>
                    </div>
                </div>
            `;
            dom.profileContainer.innerHTML = html;
        }

        function updateItemsPerView() {
            if (window.innerWidth <= 700) itemsPerView = 1;
            else if (window.innerWidth <= 900) itemsPerView = 2;
            else itemsPerView = 3;
        }

        function renderCarouselTrack() {
            if (!dom.carouselTrack) return;
            dom.carouselTrack.innerHTML = '';
            const t = TEXTS[currentLang];
            const theme = THEMES[currentTheme];
            const langColorMap = {
                'JavaScript': '#e6b450', 'TypeScript': '#2d7a6e', 'HTML': '#cf6f2e',
                'CSS': '#3d6b7c', 'Python': '#4f7e6b', 'Java': '#b0723b',
                'Go': '#4c9b8f', 'Rust': '#b26b3a', 'Vue': '#4d7c6b',
                'React': '#467c7a', 'Shell': '#7c7a58', 'default': '#9b958b'
            };
            
            reposData.forEach(repo => {
                const lang = repo.language;
                const langColor = langColorMap[lang] || langColorMap.default;
                const langSpan = lang ? `<span class="lang-color" style="background-color:${langColor};"></span> ${escapeHtml(lang)}` : '';
                const updated = repo.updated_at ? new Date(repo.updated_at).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : (currentLang === 'zh' ? '近期' : 'recent');
                
                const card = document.createElement('div');
                card.className = 'repo-carousel-card';
                card.style.backgroundColor = theme.repoCardBg;
                card.style.borderColor = theme.cardBorder;
                card.innerHTML = `
                    <div class="repo-name"><i class="fab fa-github-alt"></i><a href="${repo.html_url}" target="_blank" style="color:${theme.linkColor};">${escapeHtml(repo.name)}</a></div>
                    <div class="repo-desc" style="color:${theme.accentMuted};">${escapeHtml(repo.description || t.noDesc)}</div>
                    <div class="repo-meta" style="border-top-color:${theme.borderLight}; color:${theme.accentMuted};">
                        ${lang ? `<span>${langSpan}</span>` : ''}
                        <span><i class="far fa-star"></i> ${repo.stargazers_count ?? 0}</span>
                        <span><i class="fas fa-code-branch"></i> ${repo.forks_count ?? 0}</span>
                        <span><i class="far fa-calendar-alt"></i> ${updated}</span>
                    </div>
                `;
                dom.carouselTrack.appendChild(card);
            });
        }

        function renderDots() {
            if (!dom.repoDots) return;
            const total = Math.max(1, reposData.length - itemsPerView + 1);
            dom.repoDots.innerHTML = '';
            for (let i = 0; i < total; i++) {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                dot.style.backgroundColor = THEMES[currentTheme].dotInactive;
                dot.addEventListener('click', () => {
                    stopAutoPlay();
                    currentIndex = i;
                    updateCarousel();
                    startAutoPlay();
                });
                dom.repoDots.appendChild(dot);
            }
        }

        function updateCarousel() {
            const firstCard = dom.carouselTrack?.children[0];
            if (!firstCard) return;
            const cardWidth = firstCard.offsetWidth;
            const gap = parseFloat(getComputedStyle(dom.carouselTrack).gap) || 24;
            dom.carouselTrack.style.transform = `translateX(-${currentIndex * (cardWidth + gap)}px)`;
            
            const dots = document.querySelectorAll('#repoDots .dot');
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) {
                    dot.classList.add('active');
                    dot.style.backgroundColor = THEMES[currentTheme].dotActive;
                    dot.style.width = '24px';
                } else {
                    dot.classList.remove('active');
                    dot.style.backgroundColor = THEMES[currentTheme].dotInactive;
                    dot.style.width = '8px';
                }
            });
        }

        function startAutoPlay() {
            if (autoPlayInterval) clearInterval(autoPlayInterval);
            autoPlayInterval = setInterval(() => {
                if (!isHovering && reposData.length) {
                    const maxIdx = Math.max(0, reposData.length - itemsPerView);
                    currentIndex = currentIndex < maxIdx ? currentIndex + 1 : 0;
                    updateCarousel();
                }
            }, 4000);
        }

        function stopAutoPlay() {
            if (autoPlayInterval) clearInterval(autoPlayInterval);
            autoPlayInterval = null;
        }

        function initCarousel() {
            if (!reposData.length) return;
            if (dom.repoCountBadge) {
                dom.repoCountBadge.innerText = `${reposData.length} ${TEXTS[currentLang].repoCountPrefix}`;
            }
            updateItemsPerView();
            renderCarouselTrack();
            renderDots();
            updateCarousel();
            
            const container = document.querySelector('.carousel-container');
            if (container) {
                container.addEventListener('mouseenter', () => { isHovering = true; stopAutoPlay(); });
                container.addEventListener('mouseleave', () => { isHovering = false; startAutoPlay(); });
            }
            window.addEventListener('resize', () => {
                updateItemsPerView();
                renderCarouselTrack();
                renderDots();
                currentIndex = 0;
                updateCarousel();
                stopAutoPlay();
                startAutoPlay();
            });
            if (dom.repoPrevBtn) {
                dom.repoPrevBtn.onclick = () => {
                    stopAutoPlay();
                    const maxI = Math.max(0, reposData.length - itemsPerView);
                    currentIndex = currentIndex > 0 ? currentIndex - 1 : maxI;
                    updateCarousel();
                    startAutoPlay();
                };
            }
            if (dom.repoNextBtn) {
                dom.repoNextBtn.onclick = () => {
                    stopAutoPlay();
                    const maxI = Math.max(0, reposData.length - itemsPerView);
                    currentIndex = currentIndex < maxI ? currentIndex + 1 : 0;
                    updateCarousel();
                    startAutoPlay();
                };
            }
            startAutoPlay();
        }

        function calculateMarqueeWidth() {
            if (!dom.marqueeTrack?.children.length) return;
            marqueeTotalWidth = 0;
            for (let i = 0; i < dom.marqueeTrack.children.length; i++) {
                marqueeTotalWidth += dom.marqueeTrack.children[i].offsetWidth + 16;
            }
            marqueeContainerWidth = document.querySelector('.marquee-wrapper').offsetWidth;
            marqueePosition = 0;
            if (dom.marqueeTrack) dom.marqueeTrack.style.transform = `translateX(0px)`;
        }

        function startMarqueeAnimation() {
            if (marqueeAnimationId) cancelAnimationFrame(marqueeAnimationId);
            let lastTimestamp = 0;
            function animate(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                const delta = Math.min(100, timestamp - lastTimestamp);
                if (delta > 0 && !isMarqueeHovering && marqueeTotalWidth > marqueeContainerWidth) {
                    marqueePosition -= marqueeSpeed * (delta / 16);
                    if (marqueePosition <= -marqueeTotalWidth / 2) {
                        marqueePosition += marqueeTotalWidth / 2;
                    }
                    if (dom.marqueeTrack) {
                        dom.marqueeTrack.style.transform = `translateX(${marqueePosition}px)`;
                    }
                }
                lastTimestamp = timestamp;
                marqueeAnimationId = requestAnimationFrame(animate);
            }
            marqueeAnimationId = requestAnimationFrame(animate);
        }

        function renderMarquee() {
            if (!dom.marqueeTrack) return;
            dom.marqueeTrack.innerHTML = '';
            const theme = THEMES[currentTheme];
            const itemsToClone = [...galleryImages, ...galleryImages];
            itemsToClone.forEach((imgSrc, idx) => {
                const item = document.createElement('div');
                item.className = 'marquee-item';
                item.style.borderColor = theme.cardBorder;
                const img = document.createElement('img');
                img.loading = 'lazy';
                img.src = imgSrc;
                img.alt = `Gallery ${idx + 1}`;
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openLightbox(imgSrc);
                });
                item.appendChild(img);
                dom.marqueeTrack.appendChild(item);
            });
            setTimeout(() => calculateMarqueeWidth(), 100);
        }

        async function loadMarqueeGallery() {
            try {
                const response = await fetch('pictures/list.txt');
                if (!response.ok) throw new Error();
                const text = await response.text();
                const existingImages = text.split('\n').map(l => l.trim()).filter(l => l.length > 0 && !l.startsWith('#'));
                if (!existingImages.length) {
                    dom.marqueeSection.style.display = 'none';
                    return;
                }
                galleryImages = existingImages;
                dom.marqueeSection.style.display = 'block';
                renderMarquee();
                startMarqueeAnimation();
                
                const wrapper = document.querySelector('.marquee-wrapper');
                if (wrapper) {
                    wrapper.addEventListener('mouseenter', () => { isMarqueeHovering = true; });
                    wrapper.addEventListener('mouseleave', () => { isMarqueeHovering = false; });
                }
                window.addEventListener('resize', () => {
                    calculateMarqueeWidth();
                });
            } catch(e) {
                console.warn('加载图片列表失败:', e);
                dom.marqueeSection.style.display = 'none';
            }
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        }

        async function loadGitHubData() {
            try {
                const [userData, reposDataRaw, eventsData] = await Promise.all([
                    fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}`),
                    fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=30&direction=desc`),
                    fetchJSON(`https://api.github.com/users/${GITHUB_USERNAME}/events?per_page=1`)
                ]);
                
                let status = 'offline';
                if (eventsData && eventsData.length) {
                    const diff = (new Date() - new Date(eventsData[0].created_at)) / (1000 * 3600);
                    if (diff < 2) status = 'active';
                    else if (diff < 24) status = 'idle';
                }
                
                window._currentUserData = userData;
                window._currentStatus = status;
                renderProfileCard(userData, status);
                
                reposData = reposDataRaw.sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0)).slice(0, 10);
                if (reposData.length) {
                    dom.reposSection.style.display = 'block';
                    initCarousel();
                }
                
                const loadingPlaceholder = document.getElementById('loading-placeholder');
                if (loadingPlaceholder) {
                    loadingPlaceholder.style.display = 'none';
                }
                
                loadMarqueeGallery();
            } catch(e) {
                console.error('GitHub API 错误:', e);
                const loadingPlaceholder = document.getElementById('loading-placeholder');
                if (loadingPlaceholder) {
                    loadingPlaceholder.innerHTML = `<div class="status-message"><i class="fas fa-cloud-moon"></i> 无法获取GitHub数据，请刷新重试。</div>`;
                }
                dom.reposSection.style.display = 'none';
            }
        }

        function initThemeSelect() {
            if (!dom.themeSelect) return;
            dom.themeSelect.innerHTML = '';
            const themeKeys = Object.keys(THEMES);
            themeKeys.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                dom.themeSelect.appendChild(option);
            });
            updateThemeSelectLabels();
            dom.themeSelect.value = currentTheme;
            dom.themeSelect.addEventListener('change', (e) => applyTheme(e.target.value, true));
        }

        function init() {
            try {
                const savedTheme = localStorage.getItem(STORAGE_THEME_KEY);
                if (savedTheme && THEMES[savedTheme]) currentTheme = savedTheme;
                const savedLang = localStorage.getItem(STORAGE_LANG_KEY);
                if (savedLang && (savedLang === 'zh' || savedLang === 'en')) currentLang = savedLang;
            } catch(e) {}
            
            initThemeSelect();
            applyTheme(currentTheme, false);
            setLanguage(currentLang, false);
            initMusicPlayer();
            updateMusicButtonTheme();
            
            if (dom.musicBtn) {
                dom.musicBtn.addEventListener('click', toggleMusic);
            }
            
            if (dom.langSwitchBtn) {
                dom.langSwitchBtn.addEventListener('click', () => {
                    const newLang = currentLang === 'zh' ? 'en' : 'zh';
                    setLanguage(newLang, true);
                });
            }
            
            loadGitHubData();
        }
        
        init();
    })();
</script>
</body>
</html>
